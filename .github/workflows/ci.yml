name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13 # pinned to the loom-desk prod bun; bump deliberately
      - run: bun install --frozen-lockfile
      - run: bun x tsc --noEmit
      - run: bun test
